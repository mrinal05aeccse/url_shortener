version: "3.8"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - ADMIN_API_KEY=changeme
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    restart: unless-stopped

  # frontend is optional in this compose; run frontend locally with npm/yarn for dev